name: ci

on:
  workflow_dispatch:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  schedule:
    - cron: '0 23 * * 0,1,4'

jobs:
  build:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        build-type: [RelWithDebInfo]
        compiler: [gcc]

    env:
      ROS_DISTRO: humble

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Pre-commit ──
      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit
        run: |
          pip install pre-commit
          pre-commit run --all-files

      # ── ROS ──
      - name: Setup ROS
        run: |
          set -eux

          sudo apt update
          sudo apt install -y curl gnupg2 lsb-release ca-certificates

          sudo mkdir -p /etc/apt/keyrings
          curl -sSL https://raw.githubusercontent.com/ros/rosdistro/master/ros.asc \
            | gpg --dearmor \
            | sudo tee /etc/apt/keyrings/ros-archive-keyring.gpg > /dev/null

          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/ros-archive-keyring.gpg] \
          http://packages.ros.org/ros2/ubuntu \
          $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/ros2.list > /dev/null

          sudo apt update
          sudo apt install -y ros-${ROS_DISTRO}-ros-base

      # ── mc_rtc ──
      - name: Install mc_rtc
        run: |
          set -e
          curl -1sLf 'https://dl.cloudsmith.io/public/mc-rtc/stable/setup.deb.sh' | sudo -E bash
          sudo apt-get update

          sudo apt update
          sudo apt install -y -qq \
            libmc-rtc-dev \
            ros-${ROS_DISTRO}-mc-rtc-plugin \
            ros-${ROS_DISTRO}-xacro \
            clang-tidy

      # ── ROS2 description packages (cached) ──
      - name: Cache ROS2 workspace
        id: cache-ros2
        uses: actions/cache@v4
        with:
          path: /tmp/ros2_ws
          key: ros2-ws-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Install ROS description packages
        if: steps.cache-ros2.outputs.cache-hit != 'true'
        run: |
          set -e
          source /opt/ros/${ROS_DISTRO}/setup.bash
          sudo apt install -y python3-colcon-common-extensions

          mkdir -p /tmp/ros2_ws/src
          cd /tmp/ros2_ws/src
          git clone --depth 1 https://gitlab.com/botasys/drivers/bota_driver_ros2
          git clone --depth 1 https://github.com/PickNikRobotics/ros2_robotiq_gripper

          cd /tmp/ros2_ws
          colcon build --packages-select \
            bota_driver \
            robotiq_description

      # ── Environment ──
      - name: Export environment
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          source /tmp/ros2_ws/install/setup.bash

          echo "PATH=/opt/ros/${ROS_DISTRO}/bin:${PATH}" >> $GITHUB_ENV
          echo "AMENT_PREFIX_PATH=$AMENT_PREFIX_PATH" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH" >> $GITHUB_ENV
          echo "PYTHONPATH=$PYTHONPATH" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH" >> $GITHUB_ENV

      # ── Build & Test ──
      - name: Build and test
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
            -DWITH_BOTA_SENSOR=ON \
            -DWITH_DS4=ON \
            -DWITH_PLATE=ON \
            -DWITH_REALSENSE_CAMERA=ON \
            -DWITH_ROBOTIQ_GRIPPER=ON \
            -DWITH_SCREW=ON
          make -j$(nproc)
          sudo make install
          ctest --output-on-failure

      - name: Run clang-tidy
        run: |
          pre-commit run clang-tidy --all-files --hook-stage manual
